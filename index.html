<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcul d'Impression</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="conteneur">

    <h1> Calcul d'Impression</h1>
    <p class="sous-titre">Déposez votre fichier Word ou PDF pour calculer le prix</p>

    <div class="zone-fichier" id="zoneFichier">
      <input type="file" id="inputFichier" accept=".pdf,.doc,.docx" hidden />
      <p> Cliquez ici pour choisir un fichier</p>
      <p class="petit-texte">Formats acceptés : PDF, Word (.doc, .docx)</p>
    </div>

    <div id="nomFichier" class="nom-fichier" style="display:none;"></div>

    <div class="section">
      <label class="label-titre">Type d'impression :</label>
      <div class="choix-impression">
        <label>
          <input type="radio" name="impression" value="couleur" checked />
          Couleur
        </label>
        <label>
          <input type="radio" name="impression" value="noir" />
          Noir & Blanc
        </label>
      </div>
    </div>

    <div class="section">
      <label class="label-titre" for="copies">Nombre de copies :</label>
      <input type="number" id="copies" value="1" min="1" class="champ-nombre" />
    </div>

    <button id="btnCalculer" onclick="calculerPrix()">Calculer le prix</button>

    <div id="resultat" class="resultat" style="display:none;">
      <h2> Résultat</h2>
      <p> Nombre de pages : <strong id="affichagePages"></strong></p>
      <p> Type : <strong id="affichageType"></strong></p>
      <p> Copies : <strong id="affichageCopies"></strong></p>
      <p class="prix-total"> Prix total : <strong id="affichagePrix"></strong> FCFA</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
